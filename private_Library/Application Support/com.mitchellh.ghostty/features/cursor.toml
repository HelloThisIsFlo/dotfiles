# Cursor
# See cheat sheet: behavior-input.md

# Click to reposition editing cursor at shell prompt (requires shell integration)
# Looks enabled by default
cursor-click-to-move = true

# --- Don't touch ---
# cursor-style / cursor-style-blink: shell integration already manages this
#   (bar in insert mode, block in normal mode). Overriding here would just
#   get stomped, and blinking can interact weirdly with cursor shaders.
# cursor-color / cursor-text: theme handles these (Selenized). No need to override.
# cursor-opacity: leave at 1.0 — lower values + cursor shaders = visual jank.
