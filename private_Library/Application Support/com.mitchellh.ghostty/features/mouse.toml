# Mouse
# See cheat sheet: behavior-input.md

# Hide mouse cursor while typing — reappears on mouse movement
mouse-hide-while-typing = true

# Focus split on mouse hover (no click needed)
focus-follows-mouse = true

# --- Don't touch ---
# mouse-reporting: leave true — apps need mouse events.
# mouse-shift-capture: leave false — Shift+click is the escape hatch to select
#   text when an app (NeoVim, htop) has mouse reporting enabled.
# mouse-scroll-multiplier: default is precision:1,discrete:3 (trackpad vs wheel).
# selection-word-chars / selection-clear-on-typing / selection-clear-on-copy: defaults are fine.
