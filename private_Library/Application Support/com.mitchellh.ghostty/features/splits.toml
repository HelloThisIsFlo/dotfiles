# Splits
# See cheat sheet: splits.md
# Keybinds for creating/navigating splits are in features/keybinds

# Dim unfocused splits (range 0.15-1.0, lower = more obvious which is focused)
# unfocused-split-opacity = 0.7

# Color used for the dimming overlay
# unfocused-split-fill = #000000

# Color of the divider line between splits
# split-divider-color = #585b70

# New splits inherit current working directory (requires shell integration)
# split-inherit-working-directory = true

# Hover to focus a split instead of clicking
# focus-follows-mouse = false

# Keep zoom state when navigating between splits (1.3.0+)
# Values: navigation
# split-preserve-zoom = navigation
