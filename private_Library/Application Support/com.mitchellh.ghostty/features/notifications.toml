# Notifications, bell & close behavior
# See cheat sheet: behavior-input.md

# Note: Claude Code sends its own notifications (not through Ghostty's system).
# They still appear as Ghostty notifications since they come from the same app.
#
# Tip: In macOS Settings > Notifications > Ghostty, set:
#  - Notification style to "Persistent"
#  - Grouping to "Off".
# This gives a clear stack of individual Claude Code instances waiting for input in Notification Centre.

# Notify when a long-running command finishes (requires shell integration)
# System notification when switching away during a build, install, etc.
notify-on-command-finish = unfocused
notify-on-command-finish-after = 10s
# Actions: bell (terminal bell), notify (system notification) — prefix no- to disable
notify-on-command-finish-action = no-bell,notify

# Bell features (comma-separated, prefix no- to disable)
# Defaults: attention=on, title=on, system=off, audio=off, border=off
bell-features = no-audio,no-system,no-attention,title

# Don't ask before closing a tab/split with a running process
confirm-close-surface = false

# Keep Ghostty running after last window closes
quit-after-last-window-closed = false
