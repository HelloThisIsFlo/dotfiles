# Note: This can be migrated to a `.config/mise/conf.d/*.toml` format,
#       if need more flexibility in the future.

[tools]
# == Languages ==========
node = "lts"
golang = "1"
ruby = "3"
rust = "stable"

# -- Python -------------
# See: https://mise.jdx.dev/lang/python.html
python = "3.13"
uv = "latest"

# -- Java ---------------
# See: https://mise.jdx.dev/lang/java.html
# Don't use java = "21" shorthand — defaults to OpenJDK which stops getting updates after 6 months.
# Temurin (Eclipse Adoptium) provides long-term updates. See: https://whichjdk.com
# See: https://mise.jdx.dev/lang/java.html#usage
java = "temurin-21"  # LTS
# Gotcha: Gradle can't auto-detect mise JDKs for toolchains.
# See: https://mise.jdx.dev/lang/java.html#gradle-toolchains-detection
gradle = "9"
maven = "3"

# -- Clojure ------------
clojure = "1"
babashka = "1"

# -- Elixir -------------
erlang = "28"
elixir = "1.19.5-otp-28"  # must match erlang OTP version


# == Infrastructure =====
terraform = "1"


# == CLI Tools (aqua) ===
# aqua downloads pre-built binaries from GitHub releases — fast, cross-platform, no compilation.
# Preferred over cargo:/go: backends which compile from source.
"aqua:dandavison/delta" = "latest"
"aqua:cheat/cheat" = "latest"

[settings]
# Allow mise to read .python-version, .node-version, .ruby-version, .java-version files.
# 
# Disabled by default since 2025.10.0 to avoid mise auto-managing tools from unrelated files like go.mod or Gemfile. 
# See: https://github.com/jdx/mise/discussions/4345
# 
# Why Opt-In?
# -----------
# We opt in only for tools with a dedicated .{tool}-version convention.
# For instance:
# - .python-version -> used by uv, pyenv, and most CI platforms.
# - .node-version -> used by nvm, fnm, Vercel, Netlify.
# - .ruby-version -> used by rbenv, chruby.
# - .java-version -> used by jenv, sdkman.
# 
idiomatic_version_file_enable_tools = ["python", "node", "ruby", "java"]