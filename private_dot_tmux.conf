# setw -g window-status-current-format "#[bold] #I:#W "
# setw -g window-status-separator ""

# # Pane borders — subtle
# set -g pane-border-style "fg=colour8"
# set -g pane-active-border-style "fg=colour4"

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence — survive reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'      # restore nvim sessions too
set -g @continuum-restore 'on'                  # auto-restore on tmux start
set -g @continuum-save-interval '10'            # save every 10 min

# Hint-based copy — tmux-thumbs (Rust, faster than fingers)
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key F                            # prefix + F to activate hints
set -g @thumbs-command 'echo -n {} | pbcopy'   # macOS clipboard
set -g @thumbs-upcase-command 'open {}'         # Shift+hint opens URLs

# Floating panes
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 'p'                          # prefix + p for floating pane

# Open URLs/files from copy mode
set -g @plugin 'tmux-plugins/tmux-open'

# Yank to system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection_mouse 'off'

# fzf-powered session switcher
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'                      # prefix + o to pick sessions



set -g @plugin 'b0o/tmux-autoreload'




# PowerKit plugin
set -g @plugin 'fabioluciano/tmux-powerkit'

# Basic configuration
set -g @powerkit_plugins "ssh,battery,cpu,memory,git,hostname,bitwarden"
set -g @powerkit_theme "solarized"
set -g @powerkit_theme_variant "dark"
set -g @powerkit_transparent "true"








# ---------------------------------------------------------------------------
# Initialize TPM (keep this at the very bottom)
# ---------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
