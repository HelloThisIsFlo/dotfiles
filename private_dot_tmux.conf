# =============================================================================
# Flo's tmux.conf — TPM-based, opinionated defaults
# Drop in as ~/.tmux.conf, then: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# First launch: prefix + I to install plugins
# =============================================================================

# ---------------------------------------------------------------------------
# Terminal / Ghostty integration
# ---------------------------------------------------------------------------

# ==================
# {n}vim compatibility
# MacOS ships with a very old ncurses and terminfo. May need to update terminfo to recognize tmux-256color.
# https://gist.github.com/bbqtd/a4ac060d6f6b9ea6fe3aabe735aa9d95
# Full explanation: https://ryantravitz.com/blog/2023-02-18-pull-of-the-undercurl/
set -g default-terminal "tmux-256color"
set-option -gas terminal-overrides "*:Tc"  # true color support
set-option -gas terminal-overrides "*:RGB" # true color support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'                                                         # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m' # underscore colours - needs tmux-3.0


# Set Fish as the default shell
set -g default-shell /opt/homebrew/bin/fish   # adjust path if needed: (which fish)


# ---------------------------------------------------------------------------
# General — sane defaults
# ---------------------------------------------------------------------------
set -g prefix M-Space                       # Opt-y feels better than Ctrl-b
unbind C-b
bind M-Space send-prefix

set -g base-index 1                     # windows start at 1
setw -g pane-base-index 1              # panes start at 1
set -g renumber-windows on             # no gaps after closing windows

set -g mouse on                         # scroll, click, resize — just works
set -g history-limit 50000             # generous scrollback
set -g display-time 2000              # message display time (ms)
set -g display-panes-time 2000
set -sg escape-time 0                  # no delay after Esc (critical for nvim)
set -g focus-events on                 # needed for nvim autocommands
set -g status-interval 5

setw -g aggressive-resize on           # resize to smallest *active* client
setw -g mode-keys vi                   # vi keys in copy mode


# Single-click to focus AND interact
#
#   Use MouseUp instead of MouseDown to avoid interfering with click-drag text selection.
#   send-keys -M passes the mouse event through to the application in the pane (e.g. Neovim).
#
# -- Panes
unbind -n MouseDown1Pane
bind -n MouseUp1Pane select-pane -t = \; send-keys -M
# -- Windows
unbind -n MouseDown1Status
bind -n MouseUp1Status select-window -t =


# ---------------------------------------------------------------------------
# Keybindings — splitting, reloading
# ---------------------------------------------------------------------------
# | and - are visually intuitive (pipe = vertical divider, dash = horizontal).
# -c "#{pane_current_path}" inherits the current directory instead of opening in $HOME.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Manual reload fallback (autoreload handles this automatically via tmux-autoreload).
bind r source-file ~/.tmux.conf \; display "Config reloaded!"


# ---------------------------------------------------------------------------
# Pane resizing — (prefix + Shift+Arrow)
# ---------------------------------------------------------------------------
#
# Note: Ctrl+Arrow is used by macOS for Spaces/Mission Control, so Shift+Arrow is used instead.
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 3
bind -r S-Down  resize-pane -D 3


# ---------------------------------------------------------------------------
# Copy mode — vi-style
# ---------------------------------------------------------------------------
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi Escape send -X cancel


# ---------------------------------------------------------------------------
# Status bar — minimal, let Ghostty handle colors
# ---------------------------------------------------------------------------
# ⚠️ Replaced by 'tmux-powerkit'
