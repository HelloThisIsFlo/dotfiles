################
# Meta changes #
################
# Remap main key
#set -g prefix M-a
#unbind-key C-b
#bind-key M-a send-prefix

# Set a Ctrl-b shortcut for reloading your tmux config
bind r source-file ~/.tmux.conf

# Fix copy/paste & `nohup` (used for emacs macro)
# Commented out -> Makes tmux fail on local mini-server
# set-option -g default-command "reattach-to-user-namespace -l zsh"

################
# Tmux Plugins #
################
# List of plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Configure 'tmux-resurrect': Use Ctrl-B + 'S' and 'R' to (S)ave and (R)estore
#set -g @resurrect-save 'w'
#set -g @resurrect-restore 'z'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'





