# No delay after Escape (critical for vim users — without this, mode switching feels laggy)
set -s escape-time 0

# Enable mouse (click to select panes, scroll, drag to resize)
set -g mouse on

# Increase scrollback (default 2000 is too small for Claude Code output)
set -g history-limit 50000

# Number windows and panes from 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Reload tmux config with Ctrl-B then r
bind r source-file ~/.tmux.conf

################
# Tmux Plugins #
################
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
